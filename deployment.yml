---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeploy
  annotations:
    kubernetes.io/change-cause: "Train ticket booking image added"
spec:
  replicas: 5
  selector:
    matchLabels:
      app: swiggy
  template:
    metadata:
      labels:
        app: swiggy
    spec:
      containers:
        - name: cont3
          image: shaikmustafa/paytm:bus
          ports:
            - containerPort: 80
